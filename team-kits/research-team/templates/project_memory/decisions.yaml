# decisions.yaml — owned by: Methodologist
# Methodology Decision Records.
# Status: PROPOSED -> ACCEPTED -> SUPERSEDED
#
# Schema:
#   MDR-XXXX:
#     title: <decision>
#     context: <why this came up>
#     decision: <what was decided>
#     consequences: <trade-offs, threats to validity>
#     data_governance: <optional; for sensitive/personal data: lawful basis, anonymisation, retention, usage scope>
#     premise_invalidation_triggers:   # REQUIRED for direction-setting MDRs (method family, dataset,
#       - "<measurable tipping point>" # measurement/tooling choice …): MEASURABLE conditions under
#     status: PROPOSED                 # which the decision's premises are dead, e.g. "effect size
#                                      # needs n > 500 samples", "dataset drops below N usable traces".
#
# Premise re-check (Methodologist duty): on EVERY new RQ/PA touching a decision's area, re-check its
# triggers. A fired trigger REOPENS the decision in a NEW MDR — supersede it, or consciously re-affirm
# it with fresh reasoning against the current numbers. "MDR-xxxx is not up for renegotiation" is a
# FORBIDDEN argument (a real dev project sat 9x over its own documented tipping point until the USER
# had to raise the question the record had promised to raise).

decisions: {}
