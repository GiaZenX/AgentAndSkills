#     created: YYYY-MM-DD              # start date, set when created (TODO)
#     started: ""                     # set when moved to IN_PROGRESS
#     completed: ""                   # end date, set when DONE / VALIDATED
#     git:
#       committed: false
#       pushed: false
#       commit_hash: ""

