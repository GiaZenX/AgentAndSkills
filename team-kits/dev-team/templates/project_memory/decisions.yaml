# decisions.yaml — owned by: Architect
# Architecture Decision Records.
# Status: PROPOSED -> ACCEPTED -> SUPERSEDED
#
# Schema:
#   ADR-XXXX:
#     title: <decision>
#     context: <why this came up>
#     decision: <what was decided>
#     consequences: <trade-offs, risks>
#     threat_model: <optional; for security-relevant decisions: threats + mitigations, STRIDE-style>
#     premise_invalidation_triggers:   # REQUIRED for direction-setting ADRs (framework/no-framework,
#       - "<measurable tipping point>" # storage engine, protocol, serving model …): MEASURABLE
#       - "<another trigger>"          # conditions under which the decision's premises are dead,
#     status: PROPOSED                 # e.g. "index.html grows beyond 500 lines", "a PRD needs >2 of:
#                                      # routing, shared state, virtualisation".
#
# Premise re-check (Architect duty): on EVERY new PRD/CR touching a decision's area, re-check its
# triggers. A fired trigger REOPENS the decision in a NEW ADR — supersede it, or consciously
# re-affirm it with fresh reasoning against the current numbers. "ADR-xxxx is not up for
# renegotiation" is a FORBIDDEN argument: a real project sat 9x over its own documented 500-line
# tipping point and the USER had to raise the framework question the ADR had promised to raise.

decisions: {}
