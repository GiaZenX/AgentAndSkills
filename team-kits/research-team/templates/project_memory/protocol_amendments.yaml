# protocol_amendments.yaml — owned by: PM
# A change to an EXISTING Research Question is never silent. The PM opens a PA, runs
# an impact analysis (via subagents), gets user approval, then applies the change.
# Status: PROPOSED -> WAITING_APPROVAL -> APPROVED -> APPLIED / REJECTED
#
# Schema:
#   PA-XXXX:
#     affects: [RQ-XXXX]
#     description: <what should change>
#     affected_designs: [EXP-XXXX]       # filled by impact analysis
#     affected_tasks: [TSK-XXXX]
#     effort: low | medium | high
#     status: PROPOSED
#     created: YYYY-MM-DD                # start date, set when opened (PROPOSED)
#     applied: ""                        # end date, set when APPLIED

protocol_amendments: {}
