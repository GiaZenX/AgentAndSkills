# coding_guidelines.yaml — owned by: Architect · enforced by: QA
# Hard boundaries. A violation MUST block internal acceptance.
# Append-only: each rule is written once and stays. If a missing hard rule is
# noticed during work, whoever notices MUST flag it and the Architect appends it.
# The set only grows, never shrinks, and is not rewritten.

# Always applies, language-agnostic (shipped defaults):
global:
  - All code, comments and names in English
  - Tests are mandatory
  - No secrets in code
  - Small, focused functions; no dead or commented-out code
  - Error handling only at boundaries
  - Security: follow OWASP Top 10
  - Conventional Commits (feat/fix/test/refactor/docs)
  # Enforced by TOOLS, not by review (the pipeline blocks; see definition_of_done.yaml):
  - Style/formatting enforced by an automated formatter (e.g. prettier/black) — review never argues style
  - Linter clean (e.g. eslint/ruff) — warnings treated as errors in CI
  - Static type checking enforced (e.g. tsc strict / mypy) — no untyped escape hatches
  - Dependencies pinned (lockfile) and audited; no known critical vulnerabilities
  - Supply chain: new dependencies from trusted sources and justified; prefer the standard library
  - License compliance: every dependency carries an approved license (no copyleft/incompatible license without sign-off)

# Per-language rules. Starts EMPTY. The Architect adds a block the first time a
# language is actually used in the project. Example shape:
#   typescript:
#     - "strict: true; no any"
#   python:
#     - "type hints everywhere; ruff as linter"
languages: {}

# Anti-monolith gate (ENFORCED by scripts/kit_checks.py in the pipeline — a real App.tsx reached
# 8,966 lines while structural flags verpuffed): no hand-written source file beyond max_lines.
# The Architect owns this block: tighten the limit for UI-heavy projects (e.g. 500), and every
# exemption REQUIRES a reason (a bare path does not count) plus a split plan where applicable.
file_budget:
  max_lines: 800
  exempt: []
  #  - path: frontend/src/app/App.tsx
  #    reason: "legacy monolith — split tracked in TSK-0181"
