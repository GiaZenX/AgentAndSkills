# CI for the agents-and-skills repo itself (dogfooding).
# Lints the shipped Python, runs the structural self-check (validate.py) and the hook behaviour tests.
name: ci
on:
  push:
  pull_request:
jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # keep the cp1252 failure class testable: Python 3.15 flips Windows to UTF-8 by default
      # (PEP 686), which would silently turn the windows-latest runner green-without-meaning
      # while cp1252 field machines stay exposed — pin the legacy mode for the tests.
      PYTHONUTF8: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install tooling
        run: python -m pip install --upgrade pip ruff pyyaml pytest
      - name: Lint shipped Python (hooks + scripts + tools)
        run: ruff check team-kits tools
      - name: Structural self-check
        run: python tools/validate.py
      - name: Hook + quality.py behaviour tests
        run: python -m pytest tools/ -q
