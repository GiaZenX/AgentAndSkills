# process_definitions.yaml — owned by: Manager
# The office kit's unit of approval: a PROC is approved ONCE by the user; routine runs execute
# autonomously WITHIN it. Editing an APPROVED PROC's steps voids the approval (gate_proc_approved
# recomputes the hash) — re-approve, then `python scripts/proc_hash.py PROC-xxxx --update`.
#
# Status: PROPOSED -> APPROVED -> ACTIVE -> RETIRED
#
# Schema:
#   PROC-0001:
#     title: "Invoice intake"
#     trigger: "inbox drop matching *.pdf|*.xml (invoices)"     # or: "user request" / "quarter closed"
#     owner: bookkeeper                                          # the executing specialist role
#     steps:                                                     # hashed at approval — keep concrete
#       - "records-clerk files the document per filing_plan"
#       - "bookkeeper extracts (e-invoice first) and books via scripts/ledger_add.py"
#       - "unclear fields -> question list to the user, never guessed"
#     outputs: ["archive/<path>", "ledger entry", "flags"]
#     approval_points: ["new category needed", "amount > 500 EUR ambiguous"]
#     exceptions: "anything outside these steps returns as a question"
#     status: PROPOSED
#     approved_hash: ""                                          # set by scripts/proc_hash.py on approval

processes: {}
