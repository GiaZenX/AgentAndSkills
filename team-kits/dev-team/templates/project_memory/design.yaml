# design.yaml — owned by: Product-Designer
# UI/UX spec for UI-bearing PRDs. Phase 1 = several bold directions for the user to choose from (with a real
# visual preview in project_memory/design_preview.html); Phase 2 = the chosen direction detailed to a
# production-grade system the frontend implements verbatim. If this project has NO UI, set `applicable: false`.
#
# QUALITY BAR (non-negotiable): aim for today's best products (Stripe / Linear / Figma / Notion / Apple /
# OpenAI / Anthropic; desktop: VS Code, Claude Desktop, Blender, Fusion 360). Premium through CRAFT:
# restraint (few colors + one accent), strict spacing/type scale, clear hierarchy, short fluid micro-motion
# (150-250 ms), precise dezent feedback on every action, perceived performance (skeletons, no layout shift,
# <100 ms), keyboard shortcuts on desktop. Generic "0815" looks are a FAIL. See skills/product-designer.
#
# Schema:
#   directions:                         # Phase 1 — 2-3 DISTINCT, named, opinionated options (real examples)
#     - name: "Aurora"
#       concept: "calm glassmorphism"
#       vibe: "premium, focused, for power users"
#       palette: { bg: "#0B0F14", surface: "#141A22", primary: "#4F8CFF", accent: "#9B7BFF", text: "#E6EDF3" }
#       type: { heading: "Inter", body: "Inter", sample_px: 16 }
#       motion: "snappy 120ms, slight overshoot"
#       reference: "Linear-like"
#       why_fits: "<one line: why this direction suits the PRD>"
#       preview: |                       # compact monospace block the PM shows in the AskUserQuestion option
#         Palette  #0B0F14 bg · #4F8CFF primary · #9B7BFF accent
#         Type     Inter / Inter   Motion  120ms ease-out
#         Layout   [≡ logo]  glassy cards, generous whitespace
#   preview_html: "project_memory/design_preview.html"   # the visible side-by-side preview of all directions
#   chosen: "Aurora"                     # set after the user picks (via the PM)
#   screens:
#     <name>: { purpose: <...>, key_elements: [ ... ], states: [empty, loading, error, success] }
#   flows:
#     - { name: <...>, steps: [ <screen> -> <screen> -> ... ] }
